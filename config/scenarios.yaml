# Scenario engine parameters.
# Each scenario translates explicit geopolitical assumptions into Brent price
# and spread impact ranges. Not predictions — analytical assumptions only.

scenarios:
  de_escalation:
    label: "De-escalation"
    description: >
      Iran nuclear talks progress, ceasefire or diplomatic breakthrough,
      sanctions relief. Market risk premium unwinds. Curve flattens toward
      contango as supply risk premium exits.
    probability_prior: 0.25
    brent_return_range_pct: [-15, -5]
    m1_m3_spread_change_usd: [-2.0, -0.5]
    brent_wti_change_usd: [-1.0, 0.0]
    volatility_multiplier: 0.7

  persistent_tension:
    label: "Persistent Tension"
    description: >
      Ongoing sanctions enforcement, intermittent headline risk, no major
      resolution or escalation. Current geopolitical background extended.
      Market reprices slowly or trades sideways.
    probability_prior: 0.40
    brent_return_range_pct: [-5, 5]
    m1_m3_spread_change_usd: [-0.5, 0.5]
    brent_wti_change_usd: [-0.5, 0.5]
    volatility_multiplier: 1.0

  severe_escalation:
    label: "Severe Escalation"
    description: >
      Military strikes on Iranian oil infrastructure, Strait of Hormuz
      closure threat or actual disruption. Shipping premiums spike. Curve
      inverts sharply as prompt supply becomes scarce.
    probability_prior: 0.20
    brent_return_range_pct: [10, 30]
    m1_m3_spread_change_usd: [1.5, 5.0]
    brent_wti_change_usd: [1.0, 3.5]
    volatility_multiplier: 2.0

  escalation_with_opec_response:
    label: "Escalation + OPEC+ Response"
    description: >
      Escalation shock partially offset by Saudi/OPEC+ emergency output
      increase or coordinated SPR release. Price spike is dampened vs pure
      escalation. Spread narrows faster as additional barrels come to market.
    probability_prior: 0.15
    brent_return_range_pct: [3, 15]
    m1_m3_spread_change_usd: [0.5, 2.5]
    brent_wti_change_usd: [0.0, 1.5]
    volatility_multiplier: 1.5

# Event study window configuration
event_study:
  pre_event_days: 20
  post_event_windows: [1, 3, 5, 10]

# Regime detection configuration
regime:
  n_states: 3
  state_labels:
    0: "calm"
    1: "controlled_tension"
    2: "escalation"
  features:
    - brent_log_return
    - brent_vol_5d
    - m1_m3_spread
    - geo_shock_score
